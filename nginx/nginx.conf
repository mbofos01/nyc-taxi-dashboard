# ${VAR} placeholders are substituted from .env by envsubst at container startup.
# Nginx runtime variables ($host, $scheme, etc.) use a single $ — envsubst ignores
# them because they don't match any defined uppercase env var name.
# Rewrite capture groups ($1) are also safe: digits cannot start a variable name.

server {
    listen      80;
    server_name _;

    access_log  off;
    error_log   /var/log/nginx/error.log error;

    # ── Health check ──────────────────────────────────────────────────────
    location /health {
        return 200 'ok\n';
        add_header Content-Type text/plain;
    }

    # ── ETL Control API ───────────────────────────────────────────────────
    # FastAPI has no sub-path configured, strip the prefix.
    location /etl-api/ {
        rewrite            ^/etl-api/(.*) /$1 break;
        proxy_pass         http://${ETL_API_HOST}:${ETL_API_PORT};
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Spark Master UI ───────────────────────────────────────────────────
    # Spark has no sub-path support; strip the prefix and rewrite absolute
    # asset references in the HTML response so the browser re-prefixes them.
    location /spark/ {
        rewrite            ^/spark/(.*) /$1 break;
        proxy_pass         http://${SPARK_MASTER_HOST}:${SPARK_MASTER_UI_PORT};
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Rewrite Location headers on 3xx redirects so the browser doesn't
        # get sent to the internal http://spark-master:8080/ directly.
        proxy_redirect     http://${SPARK_MASTER_HOST}:${SPARK_MASTER_UI_PORT}/ /spark/;

        # Prevent upstream gzip from blocking sub_filter.
        proxy_set_header   Accept-Encoding   "";
        # Rewrite absolute URLs in HTML so assets load under /spark/.
        sub_filter         'href="/'         'href="/spark/';
        sub_filter         'src="/'          'src="/spark/';
        sub_filter         'action="/'       'action="/spark/';
        sub_filter_once    off;
        # NOTE: worker UI links in the master page point to each worker's unique
        # Docker hostname (e.g. nyc-taxi-dashboard-spark-worker-1:8081) and cannot
        # be generically rewritten here. Worker UI is accessible via /spark-worker/
        # only when running a single worker instance.
    }

    # ── Grafana ───────────────────────────────────────────────────────────
    # Grafana is configured with GF_SERVER_SERVE_FROM_SUB_PATH=true,
    # so it expects to receive the full /grafana/ prefix.
    location /grafana/ {
        proxy_pass         http://${GRAFANA_HOST}:${GRAFANA_PORT};
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # WebSocket support for Grafana Live
    location /grafana/api/live/ {
        proxy_pass         http://${GRAFANA_HOST}:${GRAFANA_PORT};
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
    }

    # ── Prometheus ────────────────────────────────────────────────────────
    # Prometheus is started with --web.route-prefix=/prometheus so it
    # serves all routes under /prometheus/ natively.
    location /prometheus/ {
        proxy_pass         http://${PROMETHEUS_HOST}:${PROMETHEUS_PORT};
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Pushgateway ───────────────────────────────────────────────────────
    # Pushgateway has no native sub-path support; strip the prefix and
    # rewrite absolute asset references so the UI loads correctly.
    location /pushgateway/ {
        rewrite            ^/pushgateway/(.*) /$1 break;
        proxy_pass         http://${PUSHGATEWAY_HOST}:${PUSHGATEWAY_PORT};
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_set_header   Accept-Encoding   "";
        sub_filter         'href="/'         'href="/pushgateway/';
        sub_filter         'src="/'          'src="/pushgateway/';
        sub_filter         'action="/'       'action="/pushgateway/';
        sub_filter_once    off;
    }

    # ── RabbitMQ Management ───────────────────────────────────────────────
    # RabbitMQ management is configured with management.path_prefix = /rabbitmq
    # so it serves its UI and all /api/* calls under /rabbitmq/ natively.
    # No rewrite needed — proxy_pass the full path straight through.
    location /rabbitmq/ {
        proxy_pass         http://${RABBITMQ_MGMT_HOST}:${RABBITMQ_MGMT_PORT};
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

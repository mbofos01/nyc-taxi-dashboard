name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format ETL/ models/ --check

  validate-compose:
    name: Validate docker-compose.yml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

  shellcheck:
    name: Shellcheck entrypoint.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        run: shellcheck monitoring/prometheus/entrypoint.sh

  validate-nginx:
    name: Validate nginx.conf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Substitute env placeholders and validate
        run: |
          # Substitute all ${VAR} placeholders with dummy values so nginx -t
          # sees a syntactically valid config without real secrets.
          sudo apt-get install -y --no-install-recommends gettext-base > /dev/null
          env \
            ETL_API_HOST=etl-api ETL_API_PORT=8000 \
            SPARK_MASTER_HOST=spark-master SPARK_MASTER_UI_PORT=8080 \
            GRAFANA_HOST=grafana GRAFANA_PORT=3000 \
            PROMETHEUS_HOST=prometheus PROMETHEUS_PORT=9090 \
            PUSHGATEWAY_HOST=pushgateway PUSHGATEWAY_PORT=9091 \
            RABBITMQ_MGMT_HOST=rabbitmq RABBITMQ_MGMT_PORT=15672 \
            NGINX_HOST=localhost \
            envsubst < nginx/nginx.conf > /tmp/default.conf
          docker run --rm \
            -v /tmp/default.conf:/etc/nginx/conf.d/default.conf:ro \
            nginx:1.27-alpine nginx -t

  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: extract
            context: ETL/extract
          - service: transform
            context: ETL/transform
          - service: load
            context: ETL/load
          - service: api
            context: ETL/api
          - service: fare
            context: models/fare

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

volumes:
  rabbitmq_data:
  taxi_raw_data:
  taxi_processed_data:
  taxi_models_data:
  prometheus_data:
  grafana_data:
  postgres_data:
  redis_data:

networks:
  etl-network:
    driver: bridge
  storage-network:
    driver: bridge